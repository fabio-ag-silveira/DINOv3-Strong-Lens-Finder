name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (CPU torch + package, version-locked)
        run: |
          python -m pip install --upgrade pip
          # CPU-only wheels keep the install small and fast
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          # lock torch/torchvision to the matched CPU pair so the package install
          # cannot pull a mismatched torchvision from PyPI (torchvision::nms error)
          pip freeze | grep -iE "^(torch|torchvision)==" > /tmp/constraints.txt
          pip install -e ".[dev]" -c /tmp/constraints.txt

      - name: Lint (pyflakes)
        run: find src tests app -name '*.py' -print0 | xargs -0 python -m pyflakes

      - name: Tests
        run: pytest -q
